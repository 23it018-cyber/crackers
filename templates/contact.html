{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="text-center mb-5">
        <h2 class="category-title">Contact & Operations Center</h2>
        <p class="fs-5" style="color: #64748b;">Visit our direct wholesale facility in Sivakasi.</p>
    </div>

    <div class="row g-5">
        <div class="col-md-5 mb-4">
            <div class="card bg-white border-0 shadow-sm h-100" style="border-radius: 16px;">
                <div class="card-body p-4 p-md-5">
                    <h3 class="mb-5 fw-bold" style="color: #8b5cf6;"><i class="fa-solid fa-envelope me-2"></i> Reach Out To Us</h3>
                    
                    <div class="d-flex align-items-center mb-4 pb-3 border-bottom" style="border-color: #f1f5f9 !important;">
                        <div class="rounded-circle p-3 me-3 d-flex align-items-center justify-content-center" style="background: rgba(219, 39, 119, 0.1); width: 60px; height: 60px;">
                            <i class="fa-solid fa-location-dot fs-4" style="color: #db2777;"></i>
                        </div>
                        <div>
                            <h5 class="mb-1 fw-bold" style="color: var(--text-color);">Facility Address</h5>
                            <p class="mb-0 text-muted">{{ location }}</p>
                        </div>
                    </div>
                    
                    <div class="d-flex align-items-center mb-4 pb-3 border-bottom" style="border-color: #f1f5f9 !important;">
                        <div class="rounded-circle p-3 me-3 d-flex align-items-center justify-content-center" style="background: rgba(139, 92, 246, 0.1); width: 60px; height: 60px;">
                            <i class="fa-solid fa-phone fs-4" style="color: #8b5cf6;"></i>
                        </div>
                        <div>
                            <h5 class="mb-1 fw-bold" style="color: var(--text-color);">Phone Directory</h5>
                            <p class="mb-0 text-muted">+91 98765 43210 (Toll-Free)</p>
                        </div>
                    </div>
                    
                    <div class="d-flex align-items-center">
                        <div class="rounded-circle p-3 me-3 d-flex align-items-center justify-content-center" style="background: rgba(236, 72, 153, 0.1); width: 60px; height: 60px;">
                            <i class="fa-solid fa-paper-plane fs-4" style="color: #ec4899;"></i>
                        </div>
                        <div>
                            <h5 class="mb-1 fw-bold" style="color: var(--text-color);">Email Assistance</h5>
                            <p class="mb-0 text-muted">wholesale@mkscrackers.com</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="col-md-7 mb-4">
            <div class="card bg-white border-0 shadow-sm h-100 p-2" style="border-radius: 16px;">
                <div class="card-body p-0" style="border-radius: 14px; overflow: hidden;">
                    <!-- Embedded Google Map targeting Sivakasi -->
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d62955.93291583852!2d77.76742517865363!3d9.454238714041133!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3b06cee15112fa59%3A0xeabff0b23023b185!2sSivakasi%2C%20Tamil%20Nadu!5e0!3m2!1sen!2sin!4v1700000000000!5m2!1sen!2sin" width="100%" height="100%" style="border:0; min-height: 400px;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
