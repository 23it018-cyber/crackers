{% extends 'base.html' %}

{% block content %}
<div class="container py-4 py-md-5">
    {% for category, items in categories.items() %}
    <div class="mb-4 mb-md-5 pb-3 pb-md-4 border-bottom border-light">
        <h2 class="category-title mb-3 mb-md-4">{{ category }}</h2>
        <div class="row g-3 mt-1">
            {% for item in items %}
            <div class="col-6 col-md-4 col-lg-3">
                <div class="cracker-card">
                    <div class="overflow-hidden">
                        <img src="{{ item.Image }}" alt="{{ item.Name }}" class="cracker-img" loading="lazy">
                    </div>
                    <div class="card-content">
                        <h5 class="card-title mb-1">{{ item.Name }}</h5>
                        <p class="text-muted small mb-0">Stock: {{ item.Stock }}</p>
                        <div class="price">₹{{ item.Price }}</div>
                        <button class="btn btn-outline-warning w-100 fw-bold rounded mt-2 py-2" style="font-size:0.85rem;" onclick="addToCart({{ item.ID }})">
                            <i class="fa-solid fa-cart-plus me-1"></i> Add
                        </button>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
